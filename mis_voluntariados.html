<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Mis voluntariados — Áreas Verdes</title>
  <link rel="stylesheet" href="assets/css/main.css"/>
</head>
<body>

<nav class="navbar">
  <a href="dashboard.html" class="navbar-brand"><span>🌿</span> Áreas Verdes</a>
  <div class="navbar-right" id="navbar-user"></div>
</nav>

<div class="breadcrumb">
  <a href="dashboard.html">Panel</a>
  <span class="breadcrumb-sep">›</span>
  <span>Mis voluntariados</span>
</div>

<div class="page">
  <div class="page-header">
    <div>
      <h1>🙋 Mis voluntariados</h1>
      <p style="color:var(--text-muted);font-size:14px;margin-top:4px;">Historial de actividades y certificados</p>
    </div>
  </div>

  <div id="contenido">
    <div class="empty-state"><div class="icon">⏳</div><p>Cargando...</p></div>
  </div>
</div>

<script src="assets/js/api.js"></script>
<script>
  requireRol("ciudadano");
  renderNavbar();

  getMisVoluntariados().then(data => {
    const cont = document.getElementById("contenido");

    if (!data.length) {
      cont.innerHTML = `<div class="empty-state">
        <div class="icon">🌱</div>
        <h3>Aún no te has inscrito en ningún voluntariado</h3>
        <p>Explora los parques de tu localidad para encontrar actividades.</p>
        <a href="localidades.html" class="btn btn-primary">Ver localidades</a>
      </div>`;
      return;
    }

    const horasTotales = data
      .filter(v => v.horas_efectivas)
      .reduce((acc, v) => acc + parseFloat(v.horas_efectivas), 0);

    cont.innerHTML = `
      <div style="background:var(--green-100);border-radius:12px;padding:20px 24px;margin-bottom:24px;display:flex;gap:32px;flex-wrap:wrap;border:1px solid #a5d6a7;">
        <div><p style="font-size:12px;color:var(--green-800);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Total actividades</p>
          <p style="font-size:28px;font-weight:700;color:var(--green-900);">${data.length}</p></div>
        <div><p style="font-size:12px;color:var(--green-800);font-weight:600;text-transform:uppercase;letter-spacing:.5px;">Horas acumuladas</p>
          <p style="font-size:28px;font-weight:700;color:var(--green-900);">${horasTotales}h</p></div>
      </div>

      <div class="table-card" style="overflow-x:auto;">
        <table>
          <thead>
            <tr><th>Voluntariado</th><th>Fecha</th><th>Parque</th><th>Organización</th><th>Estado</th><th>Horas</th></tr>
          </thead>
          <tbody>
            ${data.map(v => {
              const estadoPill = {
                inscrito:    `<span class="estado-pill estado-activo">📋 Inscrito</span>`,
                asistio:     `<span class="estado-pill estado-resuelto">✅ Asistió</span>`,
                no_asistio:  `<span class="estado-pill" style="background:#fdecea;color:#c62828;">❌ No asistió</span>`,
              }[v.estado] || v.estado;

              return `<tr>
                <td><strong>${v.titulo}</strong></td>
                <td style="white-space:nowrap;">${new Date(v.fecha).toLocaleDateString("es-CO")}</td>
                <td>${v.parque}</td>
                <td>${v.organizacion}</td>
                <td>${estadoPill}</td>
                <td>${v.horas_efectivas ? v.horas_efectivas + "h" : "—"}</td>
              </tr>`;
            }).join("")}
          </tbody>
        </table>
      </div>`;
  }).catch(err => {
    document.getElementById("contenido").innerHTML =
      `<div class="empty-state"><div class="icon">⚠️</div><h3>Error al cargar</h3><p>${err.message}</p></div>`;
  });
</script>
</body>
</html>
